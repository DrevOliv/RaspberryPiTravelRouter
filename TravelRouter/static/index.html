<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#161b22">
  <title>Travel Router</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <a class="brand" href="/">
    <div class="brand-icon">&#x1F4F6;</div>
    Travel Router
  </a>
  <div class="nav-spacer"></div>
  <div class="health-chip" id="health-chip" title="Backend connection status">
    <div class="dot"></div>
    <span id="health-label">API</span>
  </div>
  <a href="/drives-page" class="nav-btn">&#x1F4BE; Drives</a>
  <a href="/settings-page" class="nav-btn">&#x2699;&#xFE0F; Settings</a>
  <button class="nav-btn" id="logout-btn">Sign out</button>
</nav>

<div class="page">

  <!-- Status bar -->
  <div class="status-bar">
    <div class="chip">
      <div class="dot" id="wifi-dot"></div>
      <span class="chip-label">WiFi</span>
      <span class="chip-val" id="wifi-chip-val">&#x2014;</span>
    </div>
    <div class="chip" id="eth-chip" style="display:none;">
      <div class="dot green"></div>
      <span class="chip-label">Cable</span>
      <span class="chip-val">Connected</span>
    </div>
    <div class="chip">
      <div class="dot" id="ts-dot"></div>
      <span class="chip-label">Tailscale</span>
      <span class="chip-val" id="ts-chip-val">&#x2014;</span>
    </div>
  </div>

  <!-- Main grid -->
  <div class="grid-2">

    <!-- LEFT: WiFi Networks -->
    <div class="col col-wifi">
      <div class="card">
        <div class="card-head">
          <div class="card-title">
            <span>&#x1F4F6;</span> Networks
          </div>
          <span class="badge" id="net-badge">&#x2014;</span>
        </div>
        <div id="networks-body">
          <!-- skeleton -->
          <div style="padding:12px;display:flex;flex-direction:column;gap:8px;">
            <div class="skel" style="height:38px;"></div>
            <div class="skel" style="height:38px;"></div>
            <div class="skel" style="height:38px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: QR + Tailscale + Devices -->
    <div class="col col-right">

      <!-- AP QR Code -->
      <div class="card">
        <div class="qr-panel-head">
          <div class="qr-panel-icon">&#x1F4E1;</div>
          <div class="qr-panel-info">
            <div class="qr-panel-ssid" id="qr-ssid">&#x2014;</div>
            <div class="qr-panel-sub" id="qr-sub">Loading&#x2026;</div>
          </div>
          <button class="btn btn-sm btn-ghost" onclick="loadQr()" title="Refresh QR code" style="flex-shrink:0;">&#x21BB;</button>
        </div>
        <div class="qr-svg-wrap" id="qr-svg-wrap">
          <div class="skel" style="height:270px;width:270px;border-radius:10px;"></div>
        </div>
        <div class="qr-caption">Scan with your phone camera to join this network</div>
      </div>

      <!-- Tailscale -->
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span>&#x1F310;</span> Tailscale</div>
        </div>
        <div class="ts-body">
          <div class="ts-icon">&#x1F310;</div>
          <div class="ts-info">
            <div class="ts-state" id="ts-state">&#x2014;</div>
            <div class="ts-node"  id="ts-node-label"></div>
          </div>
          <button class="btn btn-sm btn-secondary" id="ts-toggle-btn" onclick="handleTsToggle()" disabled>
            &#x2026;
          </button>
        </div>
        <div class="toggle-row" id="exit-node-row">
          <div class="toggle-info">
            <div class="toggle-lbl">Exit Node</div>
            <div class="toggle-sub" id="exit-node-sub">No exit node selected</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="exit-toggle" onchange="handleExitToggle(this.checked)" disabled>
            <span class="track"></span>
          </label>
        </div>
      </div>

      <!-- Connected devices -->
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span>&#x1F4BB;</span> Connected Devices</div>
          <span class="badge" id="dev-badge">&#x2014;</span>
        </div>
        <div id="devices-body">
          <div class="card-empty">Loading&#x2026;</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<!-- Bottom navigation (shown on mobile only) -->
<nav class="bottom-nav">
  <a href="/" class="bottom-nav-item active">
    <span class="bottom-nav-icon">&#x1F3E0;</span>
    <span>Home</span>
  </a>
  <a href="/drives-page" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x1F4BE;</span>
    <span>Drives</span>
  </a>
  <a href="/settings-page" class="bottom-nav-item">
    <span class="bottom-nav-icon">&#x2699;&#xFE0F;</span>
    <span>Settings</span>
  </a>
  <button class="bottom-nav-item" onclick="document.getElementById('logout-btn').click()">
    <span class="bottom-nav-icon">&#x1F6AA;</span>
    <span>Sign out</span>
  </button>
</nav>

<!-- WiFi Password Modal -->
<div class="modal-backdrop" id="pw-modal" style="display:none;" onclick="closePwModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="pw-modal-title" style="margin-bottom:6px;word-break:break-all;"></h3>
    <p id="pw-modal-sub" style="margin-bottom:16px;"></p>
    <div id="pw-modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary btn-full" id="pw-modal-btn"></button>
      <button class="btn btn-ghost" style="flex-shrink:0;" onclick="closePwModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── Utilities ──────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function api(method, url, body) {
  const controller = new AbortController();
  apiControllers.add(controller);

  try {
    const opts = {
      method,
      credentials: 'include',
      headers: {},
      signal: controller.signal,
    };

    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }

    const res = await fetch(url, opts);
    if (res.status === 401 || res.status === 403) {
      if (!isLeavingPage) {
        stopBackgroundWork();
        window.location.href = '/login';
      }
      return null;
    }

    return await res.json();
  } catch (error) {
    if (error && error.name === 'AbortError') return null;
    return null;
  } finally {
    apiControllers.delete(controller);
  }
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3500);
}

// ─── State ──────────────────────────────────────────────────────────────────

let tsStatus        = null;
let savedExitNodeIP = null;
let connectingSSID  = null;
let wifiBusy        = false;
let tsBusy          = false;
let firstWifi       = true;
let firstTs         = true;
let isLeavingPage   = false;
let wifiPollTimer   = null;
let tsPollTimer     = null;

const apiControllers = new Set();

function stopBackgroundWork() {
  isLeavingPage = true;

  if (wifiPollTimer !== null) {
    clearInterval(wifiPollTimer);
    wifiPollTimer = null;
  }

  if (tsPollTimer !== null) {
    clearInterval(tsPollTimer);
    tsPollTimer = null;
  }

  if (healthTimer !== null) {
    clearInterval(healthTimer);
    healthTimer = null;
  }

  apiControllers.forEach(controller => controller.abort());
  apiControllers.clear();
}

window.addEventListener('pagehide', stopBackgroundWork);

// ─── Auth ────────────────────────────────────────────────────────────────────

async function checkAuth() {
  await api('GET', '/api/auth/session');
}

// ─── Saved exit node (fetched once on load) ──────────────────────────────────

async function fetchSavedConfig() {
  const r = await api('GET', '/settings/config');
  if (r && r.success) {
    if (r.msg.exit_node) {
      savedExitNodeIP = r.msg.exit_node;
      if (tsStatus) updateTsUI(tsStatus);
    }
    // Update QR panel header
    const ssidEl = document.getElementById('qr-ssid');
    const subEl  = document.getElementById('qr-sub');
    if (ssidEl) ssidEl.textContent = r.msg.ap_ssid || '—';
    if (subEl) {
      const secured = r.msg.ap_password && r.msg.ap_password.length > 0;
      subEl.textContent = secured ? 'WPA2 \u00b7 Protected' : 'Open network';
    }
  }
}

document.getElementById('logout-btn').addEventListener('click', async () => {
  stopBackgroundWork();
  await api('POST', '/api/auth/logout');
  window.location.href = '/login';
});

// ─── WiFi polling (every 1 s) ────────────────────────────────────────────────

async function pollWifi() {
  if (wifiBusy) return;
  wifiBusy = true;
  try {
    const r = await api('GET', '/wifi/wifi-live');
    if (r && r.success) {
      updateWifiChip(r.msg.wifi_current);
      renderNetworks(r.msg.wifi_networks, r.msg.wifi_current);
      renderDevices(r.msg.connected_devices);
      firstWifi = false;
    }
  } finally {
    wifiBusy = false;
  }
}

// ─── Tailscale polling (every 4 s) ──────────────────────────────────────────

async function pollTs() {
  if (tsBusy) return;
  tsBusy = true;
  try {
    const r = await api('GET', '/tailscale/status');
    if (r && r.success) {
      tsStatus = r.msg;
      updateTsUI(r.msg);
      firstTs = false;
    }
  } finally {
    tsBusy = false;
  }
}

// ─── UI: WiFi status chip ───────────────────────────────────────────────────

function updateWifiChip(current) {
  const connected  = current && current.ssid && current.ssid !== '--';
  const dormant    = !connected && current && current.operstate === 'dormant';
  const ethUp      = current && current.eth_operstate === 'up';

  document.getElementById('wifi-dot').className     = 'dot ' + (connected ? 'green' : dormant ? 'orange' : 'red');
  document.getElementById('wifi-chip-val').textContent = connected ? current.ssid : dormant ? 'Dormant' : 'Not connected';
  document.getElementById('eth-chip').style.display = ethUp ? '' : 'none';
}

// ─── UI: Network list ────────────────────────────────────────────────────────

function signalBars(sig) {
  const n = sig > 75 ? 4 : sig > 50 ? 3 : sig > 25 ? 2 : 1;
  return [1,2,3,4].map(i => `<div class="bar${i<=n?' on':''}"></div>`).join('');
}

function renderNetworks(networks, current) {
  const body  = document.getElementById('networks-body');
  const badge = document.getElementById('net-badge');
  badge.textContent = networks.length;

  if (!networks.length) {
    body.innerHTML = '<div class="card-empty">No networks found</div>';
    return;
  }

  const connSSID = (current && current.ssid !== '--') ? current.ssid : null;

  const sorted = [...networks].sort((a, b) => {
    if (a.ssid === connSSID) return -1;
    if (b.ssid === connSSID) return  1;
    return b.signal - a.signal;
  });

  const existing = [...body.querySelectorAll('.net-item')].map(el => el.dataset.ssid);
  const incoming = sorted.map(n => n.ssid);
  const sameOrder = existing.length === incoming.length && existing.every((s,i) => s === incoming[i]);

  if (sameOrder) {
    sorted.forEach(net => {
      const item = body.querySelector(`.net-item[data-ssid="${CSS.escape(net.ssid)}"]`);
      if (!item) return;
      const sigEl = item.querySelector('.signal');
      if (sigEl) sigEl.innerHTML = signalBars(net.signal);

      const isConn = net.ssid === connSSID;
      item.classList.toggle('is-connected',  isConn);
      item.classList.toggle('is-connecting', net.ssid === connectingSSID);

      const badge = item.querySelector('.net-badge');
      if (isConn && !badge) {
        item.querySelector('.net-meta').insertAdjacentHTML('beforeend',
          '<span class="net-badge connected">Connected</span>');
      } else if (!isConn && badge) {
        badge.remove();
      }
    });
    return;
  }

  body.innerHTML = '';
  sorted.forEach(net => {
    const item = document.createElement('div');
    item.className = 'net-item'
      + (net.ssid === connSSID        ? ' is-connected'  : '')
      + (net.ssid === connectingSSID  ? ' is-connecting' : '');
    item.dataset.ssid   = net.ssid;
    item.dataset.open   = net.is_open;
    item.dataset.sec    = net.security;

    const row = document.createElement('div');
    row.className = 'net-row';
    row.innerHTML = `
      <span style="font-size:14px;width:18px;text-align:center;flex-shrink:0;color:var(--text-sub)">
        ${net.is_open ? '&#x1F513;' : '&#x1F512;'}
      </span>
      <div class="net-ssid">${esc(net.ssid)}</div>
      <div class="net-meta">
        ${!net.is_open ? `<span class="sec-tag">${esc(net.security)}</span>` : ''}
        <div class="signal">${signalBars(net.signal)}</div>
        ${net.ssid === connSSID
          ? '<span class="net-badge connected">Connected</span>'
          : net.ssid === connectingSSID
            ? '<span class="net-badge connecting">Connecting&#x2026;</span>'
            : ''}
      </div>`;

    row.addEventListener('click', () => openPwModal(item.dataset.ssid, item.dataset.open === 'true', item.classList.contains('is-connected')));
    item.appendChild(row);
    body.appendChild(item);
  });
}

// ─── UI: WiFi Password Modal ─────────────────────────────────────────────────

let pwModalSSID   = null;
let pwModalIsOpen = false;

function openPwModal(ssid, isOpen, isConn) {
  pwModalSSID   = ssid;
  pwModalIsOpen = isOpen;

  document.getElementById('pw-modal-title').textContent = ssid;

  const fieldsEl = document.getElementById('pw-modal-fields');
  fieldsEl.innerHTML = '';

  const subEl = document.getElementById('pw-modal-sub');
  const btn   = document.getElementById('pw-modal-btn');

  if (isConn) {
    subEl.textContent  = 'Already connected. Reconnect?';
    btn.textContent    = 'Reconnect';
  } else if (isOpen) {
    subEl.textContent = 'Open network — no password required.';
    btn.textContent   = 'Connect';
  } else {
    subEl.textContent = 'Enter the WiFi password to connect.';
    btn.textContent   = 'Connect';
    const input = document.createElement('input');
    input.type        = 'password';
    input.id          = 'pw-input';
    input.placeholder = 'Password';
    input.style.width = '100%';
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitPwModal(); });
    fieldsEl.appendChild(input);
    setTimeout(() => input.focus(), 80);
  }

  btn.onclick = submitPwModal;
  document.getElementById('pw-modal').style.display = 'flex';
}

function closePwModal(e) {
  if (!e || e.target === document.getElementById('pw-modal')) {
    document.getElementById('pw-modal').style.display = 'none';
    pwModalSSID = null;
  }
}

function submitPwModal() {
  const ssid   = pwModalSSID;
  const isOpen = pwModalIsOpen;
  const input  = document.getElementById('pw-input');
  const pw     = input ? input.value : '';
  closePwModal();
  if (ssid) doConnect(ssid, isOpen, pw);
}

async function doConnect(ssid, isOpen, password) {
  connectingSSID = ssid;

  const item = document.querySelector(`.net-item[data-ssid="${CSS.escape(ssid)}"]`);
  if (item) {
    item.classList.add('is-connecting');
    const badge = item.querySelector('.net-badge');
    if (badge) { badge.className = 'net-badge connecting'; badge.textContent = 'Connecting\u2026'; }
    else item.querySelector('.net-meta')
      .insertAdjacentHTML('beforeend', '<span class="net-badge connecting">Connecting\u2026</span>');
  }

  const body = { ssid };
  if (!isOpen && password) body.password = password;

  const r = await api('POST', '/wifi/connect', body);
  connectingSSID = null;

  if (r && r.success) {
    toast(`Connected to ${ssid}`, 'success');
  } else {
    const msg = r && typeof r.msg === 'string' ? r.msg : 'Connection failed';
    toast(msg, 'error');
    if (item) item.classList.remove('is-connecting');
  }
}

// ─── UI: Devices ─────────────────────────────────────────────────────────────

function formatConnectedTime(seconds) {
  const s = Number(seconds);
  if (!s || isNaN(s)) return '';
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s / 60)}m`;
  return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
}

function renderDevices(devices) {
  const body  = document.getElementById('devices-body');
  const badge = document.getElementById('dev-badge');
  badge.textContent = devices.length;

  if (!devices.length) {
    body.innerHTML = '<div class="card-empty">No devices connected</div>';
    return;
  }

  body.innerHTML = devices.map(d => {
    const signal = d.signal_dbm ? `${esc(d.signal_dbm)} dBm` : '';
    return `
    <div class="dev-row">
      <div class="dev-icon">&#x1F4BB;</div>
      <div class="dev-info">
        <div class="dev-name">${esc(d.name || d.mac)}</div>
        <div class="dev-mac">${esc(d.ip || d.mac)}</div>
      </div>
      ${signal ? `<div class="dev-ip">${signal}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── UI: Tailscale ───────────────────────────────────────────────────────────

function updateTsUI(s) {
  document.getElementById('ts-dot').className        = 'dot ' + (s.online ? 'green' : 'red');
  document.getElementById('ts-chip-val').textContent = s.online ? 'Online' : 'Offline';

  const stateEl = document.getElementById('ts-state');
  stateEl.textContent = s.online ? 'Online' : 'Offline';
  stateEl.style.color = s.online ? 'var(--green)' : 'var(--red)';

  const savedHostname = savedExitNodeIP
    ? ((s.exit_node_servers || []).find(n => n.ip_address === savedExitNodeIP) || {}).hostname || null
    : null;

  const nodeEl = document.getElementById('ts-node-label');
  if (s.exit_node && savedHostname) {
    nodeEl.textContent = 'Via: ' + savedHostname;
  } else if (savedHostname) {
    nodeEl.textContent = 'Selected: ' + savedHostname;
  } else {
    nodeEl.textContent = s.online ? 'No exit node selected' : '';
  }

  const btn = document.getElementById('ts-toggle-btn');
  btn.disabled    = false;
  btn.textContent = s.online ? 'Disconnect' : 'Connect';
  btn.className   = 'btn btn-sm ' + (s.online ? 'btn-danger' : 'btn-primary');

  const toggle = document.getElementById('exit-toggle');
  toggle.disabled = !s.online;
  toggle.checked  = !!s.exit_node;

  const sub = document.getElementById('exit-node-sub');
  if (s.exit_node && savedHostname) {
    sub.textContent = savedHostname + ' \u2014 active';
  } else if (savedHostname) {
    sub.textContent = savedHostname + ' \u2014 not active';
  } else {
    sub.textContent = 'Select an exit node in Settings';
  }
}

// After any Tailscale action, cancel the normal 4 s timer and fire several
// quick polls (1 s, 2 s, 3 s, 5 s) so the UI catches up as soon as the
// daemon finishes, then resume normal polling.
function scheduleTsRefresh() {
  if (tsPollTimer !== null) { clearInterval(tsPollTimer); tsPollTimer = null; }

  [1000, 2000, 3000, 5000].forEach(delay => {
    setTimeout(() => { if (!isLeavingPage) void pollTs(); }, delay);
  });

  setTimeout(() => {
    if (!isLeavingPage && tsPollTimer === null) {
      tsPollTimer = setInterval(() => { void pollTs(); }, 4000);
    }
  }, 6000);
}

async function handleTsToggle() {
  if (!tsStatus) return;
  const btn = document.getElementById('ts-toggle-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';

  const endpoint = tsStatus.online ? '/tailscale/down' : '/tailscale/up';
  const r = await api('GET', endpoint);

  if (r && r.success) {
    tsStatus = r.msg;
    updateTsUI(r.msg);
    toast(r.msg.online ? 'Tailscale online' : 'Tailscale offline', 'success');
  } else {
    toast((r && typeof r.msg === 'string' ? r.msg : null) || 'Action failed', 'error');
    btn.disabled = false;
    btn.textContent = tsStatus.online ? 'Disconnect' : 'Connect';
  }

  scheduleTsRefresh();
}

async function handleExitToggle(enable) {
  const toggle = document.getElementById('exit-toggle');
  toggle.disabled = true;

  const r = await api('GET', enable ? '/tailscale/set-exit-node' : '/tailscale/disable-exit-node');
  toggle.disabled = false;

  if (r && r.success) {
    tsStatus = r.msg;
    updateTsUI(r.msg);
    toast(enable ? 'Exit node enabled' : 'Exit node disabled', 'success');
  } else {
    toggle.checked = !enable;
    const msg = r && typeof r.msg === 'string' ? r.msg : '';
    if (msg.toLowerCase().includes('choose')) {
      toast('Select an exit node in Settings first', 'warning');
    } else {
      toast(msg || 'Action failed', 'error');
    }
  }

  scheduleTsRefresh();
}

// ─── QR Code (auto-load) ─────────────────────────────────────────────────────

async function loadQr() {
  const wrap = document.getElementById('qr-svg-wrap');
  wrap.innerHTML = '<div class="skel" style="height:270px;width:270px;border-radius:10px;"></div>';
  try {
    const res = await fetch('/wifi/ap-qr', { credentials: 'include' });
    if (res.ok) {
      const svg = await res.text();
      wrap.innerHTML = `<div style="background:#fff;padding:10px;border-radius:10px;display:inline-block;line-height:0;">${svg}</div>`;
      const svgEl = wrap.querySelector('svg');
      if (svgEl) { svgEl.style.maxWidth = '270px'; svgEl.style.height = 'auto'; svgEl.style.display = 'block'; }
    } else {
      wrap.innerHTML = '<span style="color:var(--text-sub);font-size:14px;">Could not load QR code</span>';
    }
  } catch {
    wrap.innerHTML = '<span style="color:var(--text-sub);font-size:14px;">Network error</span>';
  }
}

// ─── Health check ─────────────────────────────────────────────────────────────

let healthTimer = null;

async function checkHealth() {
  try {
    const res = await fetch('/api/health', { credentials: 'include' });
    setHealth(res.ok);
  } catch {
    setHealth(false);
  }
}

function setHealth(online) {
  const chip  = document.getElementById('health-chip');
  const label = document.getElementById('health-label');
  if (!chip) return;
  chip.className    = 'health-chip ' + (online ? 'online' : 'offline');
  label.textContent = online ? 'Connected' : 'Offline';
}

// ─── Init ────────────────────────────────────────────────────────────────────

function startDashboardPage() {
  isLeavingPage = false;

  void checkAuth();
  void fetchSavedConfig();
  void pollWifi();
  void pollTs();
  void loadQr();
  void checkHealth();

  if (wifiPollTimer === null) {
    wifiPollTimer = setInterval(() => { void pollWifi(); }, 1000);
  }

  if (tsPollTimer === null) {
    tsPollTimer = setInterval(() => { void pollTs(); }, 4000);
  }

  if (healthTimer === null) {
    healthTimer = setInterval(() => { void checkHealth(); }, 5000);
  }
}

window.addEventListener('pageshow', event => {
  if (event.persisted) startDashboardPage();
});

startDashboardPage();
</script>
</body>

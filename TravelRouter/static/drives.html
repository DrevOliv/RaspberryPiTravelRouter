<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#161b22">
  <title>Drives &#x2014; Travel Router</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <a class="brand" href="/">
    <div class="brand-icon">&#x1F4F6;</div>
    Travel Router
  </a>
  <div class="nav-spacer"></div>
  <a href="/" class="nav-btn">&#x2190; Dashboard</a>
  <a href="/settings-page" class="nav-btn">&#x2699;&#xFE0F; Settings</a>
  <button class="nav-btn" id="logout-btn">Sign out</button>
</nav>

<div class="page">
  <div class="grid-2">

    <!-- LEFT: Available drives -->
    <div class="col">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span>&#x1F50C;</span> Available Drives</div>
          <span class="badge" id="avail-badge">&#x2014;</span>
        </div>
        <div id="avail-body">
          <div style="padding:12px;display:flex;flex-direction:column;gap:8px;">
            <div class="skel" style="height:56px;"></div>
            <div class="skel" style="height:56px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Mounted drives -->
    <div class="col">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><span>&#x1F4C2;</span> Mounted Drives</div>
          <span class="badge" id="mounted-badge">0</span>
        </div>
        <div id="mounted-body">
          <div class="card-empty" id="mounted-empty">No drives mounted</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<!-- Mount label modal -->
<div class="modal-backdrop" id="mount-modal" style="display:none;" onclick="closeMountModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:6px;">Mount Drive</h3>
    <p id="mount-modal-sub" style="margin-bottom:16px;color:var(--text-sub);font-size:14px;"></p>
    <div class="field">
      <label for="mount-label-input">Mount label</label>
      <input type="text" id="mount-label-input" placeholder="e.g. my_drive" maxlength="64">
    </div>
    <div class="hint" style="margin-top:8px;">Drive will be mounted at <code style="background:var(--bg-hover);padding:1px 5px;border-radius:4px;">/mnt/drives/&lt;label&gt;</code></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary btn-full" id="mount-confirm-btn">Mount</button>
      <button class="btn btn-ghost" style="flex-shrink:0;" onclick="closeMountModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── Utilities ──────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function api(method, url, body) {
  try {
    const opts = { method, credentials: 'include', headers: {} };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(url, opts);
    if (res.status === 401 || res.status === 403) {
      window.location.href = '/login';
      return null;
    }
    return await res.json();
  } catch {
    return null;
  }
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3500);
}

// ─── State ──────────────────────────────────────────────────────────────────

// Each entry: { label, mount_point, pathParts: [], dirs: [], loading: bool }
let mountedDrives = [];
let pollTimer = null;
let pollBusy  = false;

// Persist mounted drives across navigation within session
function saveMountedDrives() {
  try {
    sessionStorage.setItem('mountedDrives', JSON.stringify(
      mountedDrives.map(d => ({ label: d.label, mount_point: d.mount_point, pathParts: d.pathParts }))
    ));
  } catch {}
}

function loadMountedDrivesFromSession() {
  try {
    const raw = sessionStorage.getItem('mountedDrives');
    if (!raw) return;
    const saved = JSON.parse(raw);
    mountedDrives = saved.map(d => ({ ...d, dirs: [], loading: false }));
  } catch {}
}

// ─── Available drives polling ────────────────────────────────────────────────

async function pollAvailable() {
  if (pollBusy) return;
  pollBusy = true;
  try {
    const r = await api('GET', '/drive/available_drives');
    if (r && r.success) renderAvailable(r.msg.devices || []);
  } finally {
    pollBusy = false;
  }
}

function renderAvailable(devices) {
  const body  = document.getElementById('avail-body');
  const badge = document.getElementById('avail-badge');
  badge.textContent = devices.length;

  if (!devices.length) {
    body.innerHTML = '<div class="card-empty">No unmounted drives detected</div>';
    return;
  }

  body.innerHTML = '';
  devices.forEach(dev => {
    const item = document.createElement('div');
    item.className = 'drive-item';

    const labelText = dev.label ? `${dev.label} \u00b7 ` : '';
    item.innerHTML = `
      <div class="drive-icon">&#x1F4BE;</div>
      <div class="drive-info">
        <div class="drive-name">${esc(dev.name)}</div>
        <div class="drive-meta">${labelText}${esc(dev.size)} \u00b7 ${esc(dev.fstype)} \u00b7 ${esc(dev.device)}</div>
      </div>
      <div class="drive-actions">
        <button class="btn btn-sm btn-primary">Mount</button>
      </div>`;

    item.querySelector('.btn').addEventListener('click', () => openMountModal(dev));
    body.appendChild(item);
  });
}

// ─── Mount modal ─────────────────────────────────────────────────────────────

let pendingMountDev = null;

function openMountModal(dev) {
  pendingMountDev = dev;
  const subEl = document.getElementById('mount-modal-sub');
  const labelInput = document.getElementById('mount-label-input');

  subEl.textContent = `${dev.device} \u00b7 ${dev.size} \u00b7 ${dev.fstype}`;
  labelInput.value  = dev.label || dev.name || '';

  document.getElementById('mount-confirm-btn').onclick = confirmMount;
  labelInput.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Enter') { confirmMount(); labelInput.removeEventListener('keydown', onKey); }
  });

  document.getElementById('mount-modal').style.display = 'flex';
  setTimeout(() => labelInput.focus(), 80);
}

function closeMountModal(e) {
  if (!e || e.target === document.getElementById('mount-modal')) {
    document.getElementById('mount-modal').style.display = 'none';
    pendingMountDev = null;
  }
}

async function confirmMount() {
  const dev   = pendingMountDev;
  const label = document.getElementById('mount-label-input').value.trim();

  if (!label) { toast('Enter a mount label', 'warning'); return; }
  if (!dev)   return;

  closeMountModal();

  const btn = document.querySelector('#avail-body .btn-primary');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }

  const r = await api('POST', '/drive/mount', { device: dev.device, label });

  if (r && r.success) {
    const mountPoint = r.msg.mount_point;
    toast(`Mounted at ${mountPoint}`, 'success');

    // Avoid duplicate
    if (!mountedDrives.find(d => d.mount_point === mountPoint)) {
      mountedDrives.push({ label: r.msg.drive || label, mount_point: mountPoint, pathParts: [], dirs: [], loading: false });
      saveMountedDrives();
    }
    renderMounted();
    // Load folders for newly mounted drive
    const newDrive = mountedDrives.find(d => d.mount_point === mountPoint);
    if (newDrive) void loadFolders(newDrive);
  } else {
    toast((r && typeof r.msg === 'string' ? r.msg : null) || 'Mount failed', 'error');
  }
}

// ─── Mounted drives ──────────────────────────────────────────────────────────

function renderMounted() {
  const body       = document.getElementById('mounted-body');
  const badge      = document.getElementById('mounted-badge');
  const emptyEl    = document.getElementById('mounted-empty');
  badge.textContent = mountedDrives.length;

  if (!mountedDrives.length) {
    body.innerHTML = '';
    const empty = document.createElement('div');
    empty.id = 'mounted-empty';
    empty.className = 'card-empty';
    empty.textContent = 'No drives mounted';
    body.appendChild(empty);
    return;
  }

  body.innerHTML = '';
  mountedDrives.forEach((drive, idx) => {
    const section = document.createElement('div');
    section.className = 'mounted-drive';
    section.id = `mounted-drive-${idx}`;

    // Header row
    const head = document.createElement('div');
    head.className = 'mounted-drive-head';
    head.innerHTML = `
      <div class="drive-icon">&#x1F4C2;</div>
      <div class="drive-info">
        <div class="drive-name">${esc(drive.label)}</div>
        <div class="drive-meta">${esc(drive.mount_point)}</div>
      </div>
      <div class="drive-actions">
        <button class="btn btn-sm btn-danger unmount-btn">Unmount</button>
      </div>`;

    head.querySelector('.unmount-btn').addEventListener('click', () => unmountDrive(idx));
    section.appendChild(head);

    // Folder browser
    const browser = document.createElement('div');
    browser.className = 'folder-browser';
    browser.id = `browser-${idx}`;
    browser.appendChild(buildBreadcrumb(drive, idx));
    browser.appendChild(buildFolderList(drive, idx));
    section.appendChild(browser);

    body.appendChild(section);
  });
}

function buildBreadcrumb(drive, idx) {
  const bar = document.createElement('div');
  bar.className = 'breadcrumb';

  const root = document.createElement('span');
  root.className = drive.pathParts.length ? 'breadcrumb-seg' : 'breadcrumb-current';
  root.textContent = drive.label;
  if (drive.pathParts.length) root.addEventListener('click', () => navigateTo(idx, []));
  bar.appendChild(root);

  drive.pathParts.forEach((part, i) => {
    const sep = document.createElement('span');
    sep.className = 'breadcrumb-sep';
    sep.textContent = '/';
    bar.appendChild(sep);

    const seg = document.createElement('span');
    const isLast = i === drive.pathParts.length - 1;
    seg.className = isLast ? 'breadcrumb-current' : 'breadcrumb-seg';
    seg.textContent = part;
    if (!isLast) seg.addEventListener('click', () => navigateTo(idx, drive.pathParts.slice(0, i + 1)));
    bar.appendChild(seg);
  });

  return bar;
}

function buildFolderList(drive, idx) {
  const list = document.createElement('div');
  list.className = 'folder-list';

  if (drive.loading) {
    list.innerHTML = '<div style="padding:14px 16px;display:flex;gap:8px;align-items:center;"><span class="spin-dark"></span><span style="font-size:14px;color:var(--text-sub);">Loading\u2026</span></div>';
    return list;
  }

  if (!drive.dirs.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:14px 16px;font-size:14px;color:var(--text-sub);';
    empty.textContent = 'No subdirectories';
    list.appendChild(empty);
    return list;
  }

  drive.dirs.forEach(dir => {
    const row = document.createElement('div');
    row.className = 'folder-row';
    row.innerHTML = `
      <span class="folder-row-icon">&#x1F4C1;</span>
      <span class="folder-row-name">${esc(dir.name)}</span>
      <span style="font-size:12px;color:var(--text-sub);">&#x276F;</span>`;
    row.addEventListener('click', () => navigateTo(idx, [...drive.pathParts, dir.name]));
    list.appendChild(row);
  });

  return list;
}

async function navigateTo(idx, pathParts) {
  const drive = mountedDrives[idx];
  if (!drive) return;
  drive.pathParts = pathParts;
  saveMountedDrives();
  void loadFolders(drive, idx);
}

async function loadFolders(drive, idx) {
  // Find index if not provided
  if (idx === undefined) idx = mountedDrives.indexOf(drive);
  if (idx === -1) return;

  drive.loading = true;
  refreshBrowser(idx);

  const sub_path = drive.pathParts.join('/');
  const r = await api('POST', '/drive/folders', { mount_point: drive.mount_point, sub_path });

  drive.loading = false;

  if (r && r.success) {
    drive.dirs = r.msg.dirs || [];
  } else {
    drive.dirs = [];
    const msg = r && typeof r.msg === 'string' ? r.msg : 'Could not load folders';
    toast(msg, 'error');
  }

  refreshBrowser(idx);
}

function refreshBrowser(idx) {
  const drive   = mountedDrives[idx];
  const browser = document.getElementById(`browser-${idx}`);
  if (!browser || !drive) return;

  browser.innerHTML = '';
  browser.appendChild(buildBreadcrumb(drive, idx));
  browser.appendChild(buildFolderList(drive, idx));
}

async function unmountDrive(idx) {
  const drive = mountedDrives[idx];
  if (!drive) return;

  const section = document.getElementById(`mounted-drive-${idx}`);
  const btn = section && section.querySelector('.unmount-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }

  const r = await api('POST', '/drive/unmount', { mount_point: drive.mount_point });

  if (r && r.success) {
    toast(`Unmounted ${drive.label}`, 'success');
    mountedDrives.splice(idx, 1);
    saveMountedDrives();
    renderMounted();
  } else {
    toast((r && typeof r.msg === 'string' ? r.msg : null) || 'Unmount failed', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Unmount'; }
  }
}

// ─── Auth / logout ───────────────────────────────────────────────────────────

document.getElementById('logout-btn').addEventListener('click', async () => {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  await api('POST', '/api/auth/logout');
  window.location.href = '/login';
});

// ─── Init ────────────────────────────────────────────────────────────────────

loadMountedDrivesFromSession();
renderMounted();

// Load folders for any already-tracked drives
mountedDrives.forEach((drive, idx) => loadFolders(drive, idx));

void pollAvailable();
pollTimer = setInterval(() => { void pollAvailable(); }, 5000);
</script>
</body>
</html>
